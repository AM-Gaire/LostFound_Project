<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Campus Lost &amp; Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Libre Franklin', sans-serif; color: #15233b; }

    .lk { transition: color .15s ease, opacity .15s ease, background .15s ease, transform .15s ease, box-shadow .2s ease, border-color .15s ease; }
    .lk:hover { opacity: .9; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 16px 32px -14px rgba(15,34,64,.55); }

    .lf-input { transition: border-color .16s ease, box-shadow .16s ease, background .16s ease; }
    .lf-input:focus { border-color: #0f2240; box-shadow: 0 0 0 4px rgba(15,34,64,.1); background: #fff; outline: none; }

    @keyframes lfUp     { from { opacity:0; transform:translateY(22px); filter:blur(6px); } to { opacity:1; transform:none; filter:blur(0); } }
    @keyframes lfAurora { 0%{ transform:translate(0,0) scale(1); } 50%{ transform:translate(36px,28px) scale(1.12); } 100%{ transform:translate(0,0) scale(1); } }
    @keyframes lfShine  { to { left:150%; } }

    .lf-load   { opacity:0; animation: lfUp .8s cubic-bezier(.22,1,.36,1) forwards; }
    .lf-aurora { animation: lfAurora 16s ease-in-out infinite; }
    .lf-shine  { position:relative; overflow:hidden; }
    .lf-shine::after { content:''; position:absolute; top:0; left:-160%; width:55%; height:100%; background:linear-gradient(110deg,transparent,rgba(255,255,255,.35),transparent); transform:skewX(-20deg); pointer-events:none; }
    .lf-shine:hover::after { animation: lfShine .95s ease; }

    @media (prefers-reduced-motion: reduce) {
      .lf-load, .lf-aurora { animation:none!important; opacity:1!important; transform:none!important; filter:none!important; }
    }
  </style>
</head>
<body>

<div style="position:relative;overflow:hidden;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:48px 24px;background:radial-gradient(120% 100% at 50% -10%,#eef3fb 0%,#f6f2ea 48%,#ffffff 82%);">

  <!-- Grid pattern -->
  <div style="position:absolute;inset:0;background-image:linear-gradient(#0f22400a 1px,transparent 1px),linear-gradient(90deg,#0f22400a 1px,transparent 1px);background-size:46px 46px;mask-image:radial-gradient(80% 70% at 50% 30%,#000 0%,transparent 72%);-webkit-mask-image:radial-gradient(80% 70% at 50% 30%,#000 0%,transparent 72%);pointer-events:none;"></div>

  <!-- Aurora blobs -->
  <div class="lf-aurora" style="position:absolute;top:-140px;right:8%;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(207,122,44,.12),transparent 65%);filter:blur(20px);pointer-events:none;"></div>
  <div class="lf-aurora" style="position:absolute;bottom:-160px;left:6%;width:380px;height:380px;border-radius:50%;background:radial-gradient(circle,rgba(15,34,64,.08),transparent 65%);filter:blur(20px);pointer-events:none;animation-delay:2s;"></div>

  <!-- Card -->
  <div class="lf-load" style="position:relative;width:100%;max-width:440px;background:#fff;border:1px solid #eef1f5;border-radius:20px;box-shadow:0 40px 90px -40px rgba(15,34,64,.4);padding:48px 44px;">

    <!-- Django messages -->
    {% if messages %}
      {% for message in messages %}
      <div style="margin-bottom:20px;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:500;
        {% if message.tags == 'error' %}background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;
        {% else %}background:#f0fdf4;color:#166534;border:1px solid #bbf7d0;{% endif %}">
        {{ message }}
      </div>
      {% endfor %}
    {% endif %}

    <!-- Logo + heading -->
    <div style="display:flex;flex-direction:column;align-items:center;text-align:center;margin-bottom:34px;">
      <div style="width:64px;height:64px;border-radius:17px;background:#0f2240;display:flex;align-items:center;justify-content:center;margin-bottom:20px;box-shadow:0 16px 32px -14px rgba(15,34,64,.55);">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#e9a64a" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </div>
      <h1 style="font-family:'Source Serif 4',serif;font-size:32px;font-weight:700;color:#0f2240;margin:0 0 6px;letter-spacing:-.01em;">LostFound<span style="color:#cf7a2c;">@</span>Campus</h1>
      <p style="font-size:15px;color:#7c899c;margin:0;">Campus Lost &amp; Found Portal</p>
    </div>

    <form method="post">
      {% csrf_token %}

      <label style="display:block;font-size:13.5px;font-weight:600;color:#3a4a61;margin-bottom:8px;">Email Address</label>
      <input type="email" name="email" class="lf-input" placeholder="you@uni.ac.uk" required autofocus
        style="width:100%;border:1.5px solid #d7dde6;border-radius:10px;padding:14px 16px;font:500 15px 'Libre Franklin',sans-serif;color:#15233b;background:#fbfcfe;margin-bottom:20px;display:block;">

      <label style="display:block;font-size:13.5px;font-weight:600;color:#3a4a61;margin-bottom:8px;">Password</label>
      <input type="password" name="password" class="lf-input" placeholder="••••••••" required
        style="width:100%;border:1.5px solid #d7dde6;border-radius:10px;padding:14px 16px;font:500 15px 'Libre Franklin',sans-serif;color:#15233b;background:#fbfcfe;margin-bottom:26px;display:block;">

      <button type="submit" class="btn lf-shine"
        style="width:100%;font:600 15.5px 'Libre Franklin',sans-serif;color:#fff;background:#0f2240;border:none;padding:15px;border-radius:10px;cursor:pointer;transition:transform .15s ease,box-shadow .2s ease;">
        Sign In
      </button>
    </form>

    <p style="text-align:center;font-size:14.5px;color:#566;margin:24px 0 0;">
      Don't have an account? <a href="{% url 'register' %}" class="lk" style="font-weight:700;color:#cf7a2c;text-decoration:none;border-bottom:1.5px solid #e7c79c;">Register here</a>
    </p>

    <p style="text-align:center;font-size:13.5px;color:#9aa6b6;margin:14px 0 0;">
      Forgotten your password? <a href="{% url 'password_reset' %}" class="lk" style="font-weight:600;color:#cf7a2c;text-decoration:none;">Reset it here</a>
    </p>

    <p style="text-align:center;margin:16px 0 0;">
      <a href="{% url 'home' %}" class="lk" style="font-size:13.5px;color:#9aa3b0;text-decoration:none;">← Back to home</a>
    </p>
  </div>

</div>
</body>
</html>
