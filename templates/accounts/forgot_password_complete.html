<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Reset Complete | Campus Lost &amp; Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Libre Franklin', sans-serif; color: #15233b; }
    .btn:hover { transform: translateY(-1px); box-shadow: 0 14px 28px -14px rgba(15,34,64,.5); }
  </style>
</head>
<body>
<div style="min-height:100vh; background:#f4f6fa; display:flex; align-items:center; justify-content:center; padding:40px 20px;">
  <div style="width:100%; max-width:440px; background:#fff; border:1px solid #eef1f5; border-radius:20px; box-shadow:0 40px 90px -40px rgba(15,34,64,.4); padding:48px 44px; text-align:center;">

    <!-- Logo -->
    <div style="display:flex; flex-direction:column; align-items:center; margin-bottom:32px;">
      <div style="width:54px; height:54px; border-radius:14px; background:#0f2240; display:flex; align-items:center; justify-content:center; margin-bottom:16px; box-shadow:0 12px 28px -12px rgba(15,34,64,.55);">
        <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="#e9a64a" stroke-width="2.4" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
      </div>
      <h1 style="font-family:'Source Serif 4',serif; font-size:26px; font-weight:700; color:#0f2240; margin:0 0 5px; letter-spacing:-.01em;">LostFound<span style="color:#cf7a2c;">@</span>Campus</h1>
      <p style="font-size:14px; color:#7c899c; margin:0;">Password reset successful</p>
    </div>

    <div style="width:56px; height:56px; border-radius:16px; background:#e2f3e8; display:flex; align-items:center; justify-content:center; margin:0 auto 16px;">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1f7a44" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg>
    </div>
    <p style="font-size:14.5px; color:#7c899c; margin:0 0 28px; line-height:1.7;">Your password has been successfully reset. You can now log in with your new password.</p>

    <a href="{% url 'login' %}" class="btn" style="display:block; font:600 15.5px 'Libre Franklin',sans-serif; color:#fff; background:#0f2240; padding:15px; border-radius:10px; text-decoration:none; transition:transform .15s ease, box-shadow .2s ease;">
      Go to Login
    </a>

  </div>
</div>
</body>
</html>
